# team-preset — ローカルLLM主体 + クラウド待機のコスト階層型チーム(Phase 4.3)
#
# 「普段はローカルLLM、難しい問題だけ Claude Opus / Grok」を1クリックで再現する。
# ツールバーの 👥 チップ、または Queen tool `spawn_team {preset: "daily"}` で一括起動。
#
# ローカル側は Claude Code CLI のまま、claude-code-router(coderouter)経由で
# llama.cpp / ollama にルーティングする(ルーティングはプロセス単位の env で決まる。
# 複数ローカルモデルの切り替えは router 側の設定で行う)。
# CLI が同じ claude でも ptygrid は定義名(local / opus)でペインを区別する。
#
# 事前登録(Queen)は multi-agent サンプルと同じ。1回の `-s user` 登録が
# ローカル/クラウド両方のペインに効く。

project: team-preset

queen:
  enabled: true
  port: 39237

agents:
  # ローカルLLM: coderouter(既定 127.0.0.1:3456)経由で llama.cpp / ollama へ。
  #
  # 重要: env だけに頼らない。Claude Code は ~/.claude/settings.json (user) や
  # .claude/settings.json (project) の env ブロックも読み、バージョンによっては
  # settings 側がプロセス env に勝つ(v2.0.1 のリグレッション実績あり)。
  # プロジェクトに .claude/settings.json を置く手は同じ cwd の opus にも効いて
  # しまうため不可。per-agent の --settings(CLI引数スコープ = project/user より
  # 上位)で router.settings.json を渡すのが確実。env は保険として併記する。
  - name: local
    cmd: "claude --settings router.settings.json"
    cwd: "."
    env:
      ANTHROPIC_BASE_URL: "${CODEROUTER_URL}"   # 例: http://127.0.0.1:3456
      ANTHROPIC_AUTH_TOKEN: "${CODEROUTER_TOKEN}"
    autostart: false     # 起動はチームで(👥 daily)

  # クラウド勢: 素の Claude Code(本物の Opus)と Grok。standby 待機層
  - name: opus
    cmd: "claude"
    cwd: "."
    autostart: false

  - name: grok
    cmd: "grok"
    cwd: "."
    autostart: false

team_presets:
  daily:
    lead: local
    members:
      # エスカレーションは「難しいと感じたら」のような自己判断にしない。
      # ローカルモデルは自信を持って普通に答えてしまうため発火しない(偵察所見)。
      # 客観的な条件で必ず発火させる。
      - agent: local
        instructions: >-
          あなたは一次担当。実装・調査・レビューをまず自力で進める。
          次のどれかに当てはまったら、自分で答えられるかどうかに関係なく
          必ず opus にエスカレーションする:
          (1) テスト/ビルドが同じ原因で2回連続で失敗した
          (2) 公開API・保存データ形式・セキュリティ境界・並行処理設計に触る変更をする
          (3) 人間に「opusに聞いて」と言われた。
          手順: まず list_agents で opus が既に生きているか確認し、いなければ
          spawn_agent で "opus" を起動する(生きていれば spawn しない。二重起動すると
          同じ mailbox を2セッションが読み合って混乱する) → send_inbox で問題の要約・
          試したこと・自分の暫定案を送る → await で返信を待つ → 回答を作業に反映する。
          (2) に該当する変更は、完了報告の前に opus のレビューを受けること。
          終わったら opus のペインは人間が閉じる。
      - agent: opus
        standby: true          # 定義のみ。必要時に spawn_agent / ▶ で起動
        instructions: >-
          難問のみ担当: アーキテクチャ判断と難しいデバッグ。起動したらまず
          list_inbox で mailbox "opus" を読み、この指示を含む既読メッセージは
          ack_inbox で処理済みにする(チーム再活性化で同じ指示が複数届くことが
          ある。内容が同じなら全部 ack してよい)。実依頼には reply_inbox で
          結論と根拠を返す(reply は自動で元メッセージを ack する)。
      - agent: grok
        standby: true
        instructions: "セカンドオピニオン担当。依頼されたレビューだけ返す。"
    kickoff: "pins のタスク一覧を読んで、一番上から着手して。"

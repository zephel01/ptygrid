# ptygrid.yml — ptygrid project config (full annotated example)
#
# Copy this file to your project root as `ptygrid.yml`, then load it from the
# app toolbar. The legacy filename `mterm.yml` is still accepted; when both
# exist, `ptygrid.yml` wins. Relative `cwd` values are resolved against the
# directory containing the config file; `${VAR}` in env values is expanded
# from the host environment (missing variables become empty strings).
#
# Use-case-focused starter configs live in `example/` (basic, multi-agent,
# web-dev, worktree, teammates).
#
# agents:    interactive AI CLIs (get an `instructions` field in Phase 2)
# processes: plain long-running commands (same fields, no instructions)
# autorestart: never | on-failure | always   (default: never)

project: my-app

# queen: the built-in MCP server that lets agent CLIs inside panes read other
# panes, send them messages, spawn config-defined agents, and toast the UI.
# Every spawned session gets env QUEEN_URL=http://127.0.0.1:<port>/mcp.
# Register in Claude Code with:
#   claude mcp add -s user --transport http queen http://127.0.0.1:39237/mcp
# Both fields are optional; the whole block can be omitted.
queen:
  enabled: true   # default true; false stops the server
  port: 39237     # default 39237; if busy, +1 is tried up to 39246

# teammates: global switch for receiving Claude Code teammate/subagent hooks
# (Phase 4.0) and auto-adding read-only transcript panes (Phase 4.1). Optional.
# teammates:
#   enabled: false          # default false; true enables hook toasts + observe panes
#   hook_notifications: true
#   global_max_panes: 6     # total teammate panes across all leads (<=9)

# notifications: out-of-app alerts when a session hits a notable edge — an
# abnormal exit, a live agent that blocked on an approval/input prompt, or a
# clean finish. Opt-in: omit the block, or set enabled: false, and nothing is
# sent. Optional; the whole block can be omitted.
#
# Two things combine: the EVENT (derived automatically) and the LEVEL preset a
# channel subscribes to.
#   events: error (abnormal exit) | needs-attention (blocked) | complete | progress
#   levels: silent          -> nothing
#           critical        -> error only                         (default)
#           needs-attention -> error + needs-attention
#           all             -> everything (incl. completion)
# `error` (abnormal termination) is the one you almost always want; that is why
# the default level is `critical` rather than `silent`.
#
# `level:` at the top is the default for every channel; each channel may override
# it, so you can keep a shared Slack quiet (critical) while your own Telegram
# gets the finer-grained needs-attention. Secrets support ${VAR} expansion and
# are read from the host environment at send time.
# notifications:
#   enabled: true
#   level: critical            # global default preset for channels below
#   channels:
#     - type: os               # local desktop toast (macOS/Linux/Windows)
#       level: all             #   in-app, so full detail is fine
#     - type: slack            # Slack incoming webhook: {"text": ...}
#       webhook: "${SLACK_WEBHOOK_URL}"
#     - type: mattermost       # same incoming-webhook shape as Slack
#       webhook: "${MATTERMOST_WEBHOOK_URL}"
#     - type: discord          # Discord webhook: {"content": ...}
#       webhook: "${DISCORD_WEBHOOK_URL}"
#       level: needs-attention
#     - type: telegram         # Telegram Bot API sendMessage
#       bot_token: "${TELEGRAM_BOT_TOKEN}"
#       chat_id: "123456789"
#       level: needs-attention
#       label: mobile          # cosmetic; shown to tell channels apart

agents:
  - name: claude
    cmd: "claude"
    cwd: "."
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    autostart: false
    autorestart: never
    # Phase 4.1 observe: auto-add a read-only transcript pane when this lead
    # spawns a subagent (requires teammates.enabled above). Optional.
    # teams:
    #   enabled: true
    #   mode: observe        # observe | host
    #   max_panes: 3
    #   transcript_tail: true
    #
    # Phase 4.2 host (experimental, off by default, Unix only): host Claude
    # Code split-pane teammates as native interactive PTY panes. ptygrid drops
    # in a tmux-compat shim + per-lead Unix socket and injects the required env
    # (incl. CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1) automatically — no manual
    # setup. If the shim is not used within 2s, it falls back to observe.
    # Requires enabled: true AND mode: host (opt-in; nothing runs otherwise).
    # teams:
    #   enabled: true
    #   mode: host
    #   max_panes: 3
    #   teammate_binaries: ["claude"]  # argv0 basenames allowed to spawn (default ["claude"])
    #   fallback_to_observe: true      # auto-downgrade to observe when host is unused (default true)

  - name: codex
    cmd: "codex"
    # Optional command used only after restarting ptygrid. If omitted, cmd is used.
    # resume: "codex resume --last"
    cwd: "."
    autostart: false
    # Optional linked-worktree isolation (default disabled).
    # Each launch gets a locked branch under ptygrid/codex/... and runs from
    # the app-data directory. Dirty worktrees are never removed automatically.
    worktree:
      enabled: false
      base: HEAD
      # setup: "npm install"

  - name: grok
    cmd: "grok"
    cwd: "."
    autostart: false

processes:
  - name: web
    cmd: "npm run dev"
    cwd: "."
    autostart: false
    autorestart: on-failure
